version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: nebras_db
    environment:
      POSTGRES_DB: nebras_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: securepassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nebras_network

  redis:
    image: redis:7-alpine
    container_name: nebras_redis
    ports:
      - "6379:6379"
    networks:
      - nebras_network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: nebras_backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://postgres:securepassword@db:5432/nebras_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - nebras_network

  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: nebras_celery_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - ../backend:/app
    depends_on:
      - db
      - redis
    networks:
      - nebras_network

  nginx:
    image: nginx:alpine
    container_name: nebras_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - nebras_network

volumes:
  postgres_data:

networks:
  nebras_network:
    driver: bridge