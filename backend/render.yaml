services:
  - type: web
    name: nebras-erp-api
    plan: free
    env: python
    packageManager: pip
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    region: oregon
    healthCheckPath: /api/v1/admissions/applicants/public-config/
    disk:
      name: nebras-erp-data
      mountPath: /var/lib/nebras-erp
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nebras-erp.vercel.app,https://*.vercel.app,http://localhost:4200"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: DATABASE_PATH
        value: /var/lib/nebras-erp/db.sqlite3
