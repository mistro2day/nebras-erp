services:
  - type: web
    name: nebras-erp-api
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    region: oregon
    healthCheckPath: /api/v1/admissions/applicants/public-config/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_Sl7eDaUjC8wH@ep-long-water-atrwd2fn-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nebras-erp.vercel.app,https://*.vercel.app,http://localhost:4200"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"
      - key: SKIP_COLLECTSTATIC
        value: "True"
